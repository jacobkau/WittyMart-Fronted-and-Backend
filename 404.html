<!DOCTYPE html>
<html>
<head>
    <title>Page Not Found - WittyMart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-box {
            text-align: center;
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .error-box h1 { color: #05573c; font-size: 4rem; margin: 0; }
        .error-box h2 { color: #333; }
        .error-box p { color: #666; }
        .error-box a { color: #05573c; text-decoration: none; }
        .error-box a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist.</p>
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
